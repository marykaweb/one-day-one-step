<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест ВК</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .box { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .ok { color: #28a745; font-weight: bold; }
        .err { color: #dc3545; font-weight: bold; }
        .log { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #f8f9fa; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>🔍 Диагностика ВК Mini App</h2>
    <div id="output" class="log">Запуск тестов...</div>

    <script>
        const log = (msg, type = '') => {
            const el = document.getElementById('output');
            el.innerHTML += `\n[${type}] ${msg}`;
            console.log(`[${type}] ${msg}`);
        };

        async function runTests() {
            // 1. Проверка URL
            log(`📍 URL: ${window.location.href}`);
            const isVK = window.location.href.includes('vk.com') || window.location.href.includes('vk-apps.com');
            log(`✅ Внутри ВК: ${isVK ? 'ДА' : 'НЕТ'}`, isVK ? 'ok' : '');

            // 2. Проверка vkBridge
            if (window.vkBridge) {
                log('✅ vkBridge загружен', 'ok');
                try {
                    await vkBridge.send('VKWebAppInit');
                    log('✅ VKWebAppInit: УСПЕХ', 'ok');
                } catch (e) {
                    log(`❌ VKWebAppInit: ${e.message}`, 'err');
                }
            } else {
                log('❌ vkBridge НЕ загружен', 'err');
            }

            // 3. Проверка fetch к таблице
            const testUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeJ5SzWpqpRRRUR4R4iX_YNhhnmp_6RFpoYuRSXYSYJ7igpnMeqxNogOo3H-dnwMX_La9U5sTMaLsN/pub?output=csv&gid=0';
            log(`🌐 Тест запроса к: ${testUrl.substring(0,80)}...`);
            
            try {
                const resp = await fetch(testUrl, { mode: 'cors', cache: 'no-cache' });
                log(`📡 Статус: ${resp.status} ${resp.ok ? '✓' : '✗'}`, resp.ok ? 'ok' : 'err');
                if (resp.ok) {
                    const text = await resp.text();
                    log(`📄 Получено байт: ${text.length}`, 'ok');
                    log(`📝 Первые 100 символов: "${text.substring(0,100)}..."`);
                }
            } catch (e) {
                log(`❌ Fetch ошибка: ${e.message}`, 'err');
                log('💡 Возможные причины: 1) Блокировка CORS в ВК 2) Нет интернета 3) Неверный URL');
            }

            // 4. Проверка localStorage
            try {
                localStorage.setItem('test_key', 'test_value');
                const val = localStorage.getItem('test_key');
                log(`💾 localStorage: ${val === 'test_value' ? 'РАБОТАЕТ' : 'НЕ РАБОТАЕТ'}`, val === 'test_value' ? 'ok' : 'err');
            } catch (e) {
                log(`❌ localStorage ошибка: ${e.message}`, 'err');
            }

            log('\n=== ТЕСТ ЗАВЕРШЁН ===');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', runTests);
        } else {
            runTests();
        }
    </script>
</body>
</html>
