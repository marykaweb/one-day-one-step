<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь Заданий</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            padding: 12px; 
            background: #fff; 
            color: #000;
            line-height: 1.4;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 15px;
            border-bottom: 1px solid #e1e3e6;
            margin-bottom: 10px;
        }
        .header h2 { font-size: 18px; font-weight: 600; }
        .nav-btn {
            background: #0077FF;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .weekday {
            text-align: center;
            font-size: 11px;
            color: #888;
            padding: 6px 2px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .day { 
            padding: 10px 4px; 
            background: #f0f2f5; 
            border-radius: 8px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 14px;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .day:hover { background: #e1e3e6; }
        .day.active { background: #0077FF; color: white; }
        .day.has-task { border: 2px solid #4BB34B; }
        .day.has-task::after {
            content: '';
            position: absolute;
            bottom: 5px;
            width: 6px;
            height: 6px;
            background: #4BB34B;
            border-radius: 50%;
        }
        .day.completed {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            font-weight: 600;
        }
        .day.completed::after {
            content: '✓';
            bottom: auto;
            top: 2px;
            right: 4px;
            font-size: 10px;
            background: transparent;
        }
        .day.empty { background: transparent; cursor: default; }
        .day.today { border: 2px solid #0077FF; font-weight: 600; }
        
        #task-box { 
            background: #f5f7fa; 
            padding: 16px; 
            border-radius: 12px; 
            margin-top: 16px;
            display: none;
        }
        #task-box h3 { margin: 0 0 12px 0; font-size: 16px; font-weight: 600; }
        #task-text { margin: 0 0 12px 0; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
        .status { font-size: 13px; margin: 0; padding-top: 10px; border-top: 1px solid #e1e3e6; }
        .status-ok { color: #4BB34B; }
        .status-wait { color: #FF9500; }
        .status-done { color: #28a745; }
        
        .complete-btn {
            width: 100%;
            padding: 12px;
            background: #4BB34B;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .complete-btn:hover { background: #3d9c3d; }
        .complete-btn.completed { background: #ccc; cursor: default; }
        
        .loading { text-align: center; color: #888; padding: 30px; }
        
        /* Блок диагностики — всегда виден */
        .diagnostic {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            font-size: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .diagnostic-success { background: #d4edda; border-color: #28a745; }
        .diagnostic-error { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .diagnostic-warning { background: #fff3cd; border-color: #ffc107; }
        
        .step { margin: 8px 0; padding: 6px; border-left: 3px solid #ccc; }
        .step-ok { border-left-color: #28a745; }
        .step-error { border-left-color: #dc3545; }
        .step-pending { border-left-color: #ffc107; }
    </style>
</head>
<body>

    <div class="header">
        <button class="nav-btn" id="prevBtn">◀</button>
        <h2 id="monthTitle">Диагностика...</h2>
        <button class="nav-btn" id="nextBtn">▶</button>
    </div>

    <!-- БЛОК ДИАГНОСТИКИ -->
    <div id="diagnostic-box" class="diagnostic">Запуск диагностики...</div>

    <div class="calendar" id="weekdays">
        <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div>
        <div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
    </div>
    <div class="calendar" id="calendar"></div>

    <div id="task-box">
        <h3>📌 <span id="date-title"></span></h3>
        <div id="task-text"></div>
        <p class="status">Статус: <span id="task-status"></span></p>
        <button id="completeBtn" class="complete-btn" style="display:none;">
            ✅ Отметить как выполненное
        </button>
    </div>

    <script>
        // 🔧 НАСТРОЙКИ
        const BASE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQeJ5SzWpqpRRRUR4R4iX_YNhhnmp_6RFpoYuRSXYSYJ7igpnMeqxNogOo3H-dnwMX_La9U5sTMaLsN/pub?output=csv&gid=';
        const SHEETS_GID = {
            'Март 2026': '0',  // ← ПРОВЕРЬТЕ ЭТОТ GID!
        };
        const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        const STORAGE_KEY = 'marathon_oneday_onestep_2026';

        let tasksData = {};
        let completedDays = [];
        let currentDate = new Date();
        let isVKMode = false;

        const diagnosticBox = document.getElementById('diagnostic-box');
        const calendarEl = document.getElementById('calendar');
        const monthTitleEl = document.getElementById('monthTitle');
        const taskBox = document.getElementById('task-box');
        const taskTextEl = document.getElementById('task-text');
        const completeBtn = document.getElementById('completeBtn');

        // 📝 Логирование в диагностический блок
        let diagnosticLog = [];
        function log(message, type = 'info') {
            diagnosticLog.push({ message, type, time: new Date().toLocaleTimeString() });
            renderDiagnostic();
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function renderDiagnostic() {
            diagnosticBox.innerHTML = diagnosticLog.map(entry => 
                `<div class="step step-${entry.type === 'error' ? 'error' : entry.type === 'success' ? 'ok' : 'pending'}">
                    <strong>[${entry.time}]</strong> ${entry.message}
                </div>`
            ).join('');
            
            const hasError = diagnosticLog.some(e => e.type === 'error');
            diagnosticBox.className = 'diagnostic ' + (hasError ? 'diagnostic-error' : 'diagnostic-warning');
        }

        // 🔍 Проверка режима
        function detectVKMode() {
            log('Проверка режима запуска...', 'info');
            const href = window.location.href;
            const isVK = href.includes('vk.com') || href.includes('vk-apps.com');
            isVKMode = isVK;
            log(`Режим: ${isVK ? 'ВКонтакте ☁️' : 'Браузер (GitHub Pages) 💻'}`, isVK ? 'success' : 'info');
            log(`URL: ${href.substring(0, 50)}...`, 'info');
            return isVK;
        }

        // 📄 Парсинг CSV
        function parseCSV(csvText) {
            log(`Парсинг CSV (${csvText.length} байт)...`, 'info');
            const result = {};
            const lines = csvText.split(/\r?\n/);
            log(`Всего строк: ${lines.length}`, 'info');
            
            if (lines.length < 2) {
                throw new Error('Слишком мало строк в CSV');
            }
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            log(`Заголовки: ${headers.join(', ')}`, 'info');
            
            const dayIdx = headers.indexOf('День');
            const taskIdx = headers.indexOf('Задание');
            
            if (dayIdx === -1 || taskIdx === -1) {
                throw new Error(`Не найдены колонки. День=${dayIdx}, Задание=${taskIdx}`);
            }
            log(`Индексы колонок: День=${dayIdx}, Задание=${taskIdx}`, 'success');
            
            let currentLine = '';
            let inQuotes = false;
            const processedLines = [];
            
            for (let i = 1; i < lines.length; i++) {
                currentLine += (currentLine ? '\n' : '') + lines[i];
                const quotes = (currentLine.match(/"/g) || []).length;
                inQuotes = quotes % 2 !== 0;
                if (!inQuotes) {
                    processedLines.push(currentLine);
                    currentLine = '';
                }
            }
            if (currentLine) processedLines.push(currentLine);
            
            log(`Обработано строк с данными: ${processedLines.length}`, 'info');
            
            for (const line of processedLines) {
                if (!line.trim()) continue;
                const commaIndex = line.indexOf(',');
                if (commaIndex === -1) continue;
                const day = parseInt(line.substring(0, commaIndex).trim());
                let task = line.substring(commaIndex + 1).trim();
                if (task.startsWith('"') && task.endsWith('"')) {
                    task = task.slice(1, -1).replace(/""/g, '"');
                }
                if (day >= 1 && day <= 31 && task) {
                    result[day] = task;
                    log(`✓ День ${day} загружен`, 'success');
                }
            }
            
            log(`Итого загружено дней: ${Object.keys(result).length}`, 'success');
            return result;
        }

        function formatTaskText(text) {
            if (!text) return '✨ Нет задания';
            let formatted = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            formatted = formatted.replace(/(#\w+)/g, '<span style="color:#0077FF;font-weight:500">$1</span>');
            return formatted;
        }

        // 💾 Сохранение (ТОЛЬКО localStorage вне ВК)
        function saveProgress() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(completedDays));
                log('Прогресс сохранён в localStorage', 'success');
            } catch (e) {
                log(`Ошибка сохранения: ${e.message}`, 'error');
            }
        }

        function loadProgress() {
            try {
                const local = localStorage.getItem(STORAGE_KEY);
                if (local) {
                    const data = JSON.parse(local);
                    log(`Загружено ${data.length} выполненных дней из localStorage`, 'success');
                    return data;
                }
                log('Нет сохранённых данных', 'info');
                return [];
            } catch (e) {
                log(`Ошибка загрузки прогресса: ${e.message}`, 'error');
                return [];
            }
        }

        // 🔄 Загрузка из Google Таблицы
        async function loadTasks(year, monthIndex) {
            const sheetKey = `${MONTHS_RU[monthIndex]} ${year}`;
            const gid = SHEETS_GID[sheetKey];
            
            log(`📋 Ищем лист: "${sheetKey}"`, 'info');
            
            if (!gid) {
                throw new Error(`❌ Лист "${sheetKey}" не найден в настройках SHEETS_GID`);
            }
            log(`✓ GID найден: ${gid}`, 'success');
            
            const url = `${BASE_CSV_URL}${gid}`;
            log(`🌐 Запрос URL: ${url}`, 'info');
            
            // Проверка доступности URL
            try {
                const response = await fetch(url, { 
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });
                
                log(`📡 Статус ответа: ${response.status} ${response.ok ? '✓' : '✗'}`, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const csvText = await response.text();
                log(`📄 Получено байт: ${csvText.length}`, 'success');
                
                // Показываем первые 200 символов для проверки
                log(`📝 Начало данных: "${csvText.substring(0, 200)}..."`, 'info');
                
                return parseCSV(csvText);
            } catch (e) {
                log(`❌ Ошибка fetch: ${e.message}`, 'error');
                log(`Возможные причины: 1) Таблица не опубликована 2) Неверный GID 3) CORS`, 'error');
                throw e;
            }
        }

        // 📅 Отрисовка календаря
        function renderCalendar(year, monthIndex) {
            log('Отрисовка календаря...', 'info');
            calendarEl.innerHTML = '';
            monthTitleEl.textContent = `${MONTHS_RU[monthIndex]} ${year}`;
            
            const firstDay = new Date(year, monthIndex, 1);
            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
            let startDay = firstDay.getDay() - 1;
            if (startDay < 0) startDay = 6;
            
            for (let i = 0; i < startDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                calendarEl.appendChild(empty);
            }
            
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                dayDiv.textContent = day;
                
                if (tasksData[day]) dayDiv.classList.add('has-task');
                if (completedDays.includes(day)) dayDiv.classList.add('completed');
                if (year === today.getFullYear() && monthIndex === today.getMonth() && day === today.getDate()) {
                    dayDiv.classList.add('today');
                }
                
                dayDiv.onclick = () => showTask(day, year, monthIndex, dayDiv);
                calendarEl.appendChild(dayDiv);
            }
            
            log(`✓ Календарь отрисован (${daysInMonth} дней)`, 'success');
        }

        function showTask(day, year, monthIndex, clickedEl) {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
            clickedEl.classList.add('active');
            
            document.getElementById('date-title').textContent = `${day} ${MONTHS_RU[monthIndex]} ${year}`;
            
            const task = tasksData[day];
            taskTextEl.innerHTML = formatTaskText(task);
            
            const taskStatus = document.getElementById('task-status');
            const isCompleted = completedDays.includes(day);
            
            if (task) {
                if (isCompleted) {
                    taskStatus.textContent = '✓ Выполнено';
                    taskStatus.className = 'status-done';
                    completeBtn.textContent = '✓ Уже выполнено';
                    completeBtn.classList.add('completed');
                    completeBtn.disabled = true;
                } else {
                    taskStatus.textContent = 'Ожидает выполнения';
                    taskStatus.className = 'status-wait';
                    completeBtn.textContent = '✅ Отметить как выполненное';
                    completeBtn.classList.remove('completed');
                    completeBtn.disabled = false;
                    completeBtn.onclick = () => markDayComplete(day);
                }
                completeBtn.style.display = 'block';
            } else {
                taskStatus.textContent = 'Свободный день ✨';
                taskStatus.className = 'status-ok';
                completeBtn.style.display = 'none';
            }
            
            taskBox.style.display = 'block';
        }

        function markDayComplete(day) {
            if (!completedDays.includes(day)) {
                completedDays.push(day);
                saveProgress();
                
                document.getElementById('task-status').textContent = '✓ Выполнено';
                document.getElementById('task-status').className = 'status-done';
                completeBtn.textContent = '✓ Уже выполнено';
                completeBtn.classList.add('completed');
                completeBtn.disabled = true;
                
                document.querySelectorAll('.day').forEach(d => {
                    if (d.textContent == day) d.classList.add('completed');
                });
            }
        }

        function updateNavButtons(year, monthIndex) {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevMonth = monthIndex === 0 ? 11 : monthIndex - 1;
            const prevYear = monthIndex === 0 ? year - 1 : year;
            const nextMonth = monthIndex === 11 ? 0 : monthIndex + 1;
            const nextYear = monthIndex === 11 ? year + 1 : year;
            prevBtn.disabled = !SHEETS_GID[`${MONTHS_RU[prevMonth]} ${prevYear}`];
            nextBtn.disabled = !SHEETS_GID[`${MONTHS_RU[nextMonth]} ${nextYear}`];
        }

        async function updateMonth(year, monthIndex) {
            calendarEl.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
            taskBox.style.display = 'none';
            
            try {
                tasksData = await loadTasks(year, monthIndex);
                
                if (Object.keys(tasksData).length === 0) {
                    log('⚠️ Задания не найдены в таблице', 'error');
                } else {
                    renderCalendar(year, monthIndex);
                    updateNavButtons(year, monthIndex);
                    diagnosticBox.className = 'diagnostic diagnostic-success';
                }
            } catch (error) {
                log(`❌ КРИТИЧЕСКАЯ ОШИБКА: ${error.message}`, 'error');
                calendarEl.innerHTML = `<div class="diagnostic diagnostic-error">
                    <strong>Ошибка загрузки:</strong><br>
                    ${error.message}<br><br>
                    <strong>Что проверить:</strong><br>
                    1. Опубликована ли таблица (Файл → Поделиться → Опубликовать)<br>
                    2. Правильный ли GID в настройках<br>
                    3. Заголовки колонок точно "День" и "Задание"
                </div>`;
            }
        }

        document.getElementById('prevBtn').onclick = () => {
            let month = currentDate.getMonth(), year = currentDate.getFullYear();
            month--; if (month < 0) { month = 11; year--; }
            currentDate = new Date(year, month, 1);
            updateMonth(year, month);
        };
        
        document.getElementById('nextBtn').onclick = () => {
            let month = currentDate.getMonth(), year = currentDate.getFullYear();
            month++; if (month > 11) { month = 0; year++; }
            currentDate = new Date(year, month, 1);
            updateMonth(year, month);
        };

        // 🚀 ЗАПУСК С ДИАГНОСТИКОЙ
        async function initApp() {
            log('=== ЗАПУСК ПРИЛОЖЕНИЯ ===', 'info');
            log(`Время: ${new Date().toLocaleString()}`, 'info');
            log(`User Agent: ${navigator.userAgent.substring(0, 50)}...`, 'info');
            
            // 1. Определяем режим
            detectVKMode();
            
            // 2. VK Bridge ТОЛЬКО если в ВК (без await чтобы не блокировать)
            if (isVKMode && window.vkBridge) {
                log('Инициализация VK Bridge...', 'info');
                vkBridge.send('VKWebAppInit')
                    .then(() => log('✓ VK Bridge инициализирован', 'success'))
                    .catch(e => log(`⚠️ VK Bridge ошибка: ${e.message}`, 'warning'));
            } else {
                log('VK Bridge не используется (не ВКонтакте)', 'info');
            }
            
            // 3. Загружаем прогресс
            completedDays = loadProgress();
            
            // 4. Загружаем календарь
            await updateMonth(currentDate.getFullYear(), currentDate.getMonth());
            
            log('=== ЗАПУСК ЗАВЕРШЁН ===', 'success');
        }

        // Старт
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
